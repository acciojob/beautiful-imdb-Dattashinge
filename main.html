<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMDb Movie Detail Page</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .moviePic {
      height: 450px;
      width: 300px;
      opacity: 0.9;
      margin-top: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(255,255,255,0.3);
    }

    .movieDetail {
      position: relative;
      top: 30px;
      width: 70%;
      margin: auto;
      text-align: center;
      font-size: 20px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <img 
    class="moviePic"
    src="https://m.media-amazon.com/images/I/81p+xe8cbnL._AC_SY679_.jpg"
    alt="Movie Poster"
  >

  <p class="movieDetail">
    Interstellar is a visually stunning science fiction movie directed by Christopher Nolan. 
    The film explores space travel, time dilation, love, and survival as a team of astronauts 
    searches for a new habitable planet to save humanity.
  </p>

</body>
</html>
